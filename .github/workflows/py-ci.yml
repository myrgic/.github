name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.12'
      run-pyright:
        required: false
        type: boolean
        default: false
      pyright-files:
        required: false
        type: string
        default: '.'
      test-command:
        required: false
        type: string
        default: 'pytest tests/ -v --tb=short'
      smoke-test:
        required: false
        type: string
        default: ''

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
      - if: inputs.run-pyright
        run: |
          pip install pyright
          pyright --pythonversion ${{ inputs.python-version }} ${{ inputs.pyright-files }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - run: ${{ inputs.test-command }}

  smoke:
    if: inputs.smoke-test != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - run: ${{ inputs.smoke-test }}
