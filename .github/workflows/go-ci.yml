name: Go CI

on:
  workflow_call:
    inputs:
      go-version:
        required: false
        type: string
        default: '1.24'
      build-tags:
        required: false
        type: string
        default: ''
      run-lint:
        required: false
        type: boolean
        default: true
      run-e2e:
        required: false
        type: boolean
        default: false
      e2e-script:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - if: inputs.build-tags != ''
        run: go build -tags "${{ inputs.build-tags }}" ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - run: go test -race -count=1 ./...

  lint:
    if: inputs.run-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1

  e2e:
    if: inputs.run-e2e && inputs.e2e-script != ''
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - run: go build -o cogos ./...
      - run: ${{ inputs.e2e-script }}
